services:
  friday-night-movie:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    environment:
      - TZ=UTC # Change to your local timezone if needed
      - JELLYFIN_URL
      - JELLYFIN_KEY
      - RADARR_URL
      - RADARR_KEY
      - TMDB_KEY
      - GEMINI_KEY
      - GEMINI_TEST_KEY
      - GROQ_API_KEY
      - OPENROUTER_API_KEY
      - LLM_PROVIDER
      - LLM_MODEL
      - LLM_ENDPOINT
